<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码访问 - 员工考勤系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 32px;
    }

    .qr-container {
      background: #f9fafb;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 2px dashed #e5e7eb;
    }

    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .url-display {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      color: #3B82F6;
      word-break: break-all;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }

    .copy-btn {
      background: #3B82F6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      background: #2563EB;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    .tips {
      background: #eff6ff;
      border-left: 4px solid #3B82F6;
      padding: 16px;
      border-radius: 8px;
      text-align: left;
      margin-top: 24px;
    }

    .tips-title {
      font-weight: 600;
      color: #3B82F6;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .tips-list {
      color: #4b5563;
      font-size: 14px;
      line-height: 1.8;
      list-style: none;
    }

    .tips-list li {
      padding-left: 20px;
      position: relative;
    }

    .tips-list li:before {
      content: "•";
      position: absolute;
      left: 8px;
      color: #3B82F6;
      font-weight: bold;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #d1fae5;
      color: #065f46;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .demo-account {
      background: #fef3c7;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-size: 14px;
      color: #92400e;
    }

    .demo-account strong {
      color: #78350f;
    }

    @media (max-width: 600px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .logo {
        width: 64px;
        height: 64px;
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📱</div>
    <h1>员工考勤系统</h1>
    <p class="subtitle">扫描二维码或复制链接访问</p>
    
    <div class="status">
      <span class="status-dot"></span>
      <span>开发服务器运行中</span>
    </div>

    <div class="qr-container">
      <div id="qrcode"></div>
      <div class="url-display" id="url">正在获取访问地址...</div>
      <button class="copy-btn" onclick="copyUrl()">📋 复制链接</button>
    </div>

    <div class="demo-account">
      <strong>🔑 演示账号</strong><br>
      用户名: <code>admin</code> | 密码: <code>admin123</code>
    </div>

    <div class="tips">
      <div class="tips-title">💡 使用提示</div>
      <ul class="tips-list">
        <li>确保手机和电脑在同一WiFi网络下</li>
        <li>使用手机浏览器扫描二维码访问</li>
        <li>建议使用 Chrome 或 Safari 浏览器</li>
        <li>可以将页面添加到手机主屏幕使用</li>
      </ul>
    </div>
  </div>

  <!-- 使用 qrcodejs 生成二维码 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    // 获取本地IP地址并生成二维码
    function getLocalUrl() {
      // 从当前页面URL获取主机和端口
      const protocol = window.location.protocol;
      const host = window.location.hostname;
      const port = '5173'; // Vite 默认端口
      
      // 如果是 localhost，尝试获取局域网IP
      if (host === 'localhost' || host === '127.0.0.1') {
        // 显示提示信息
        return `请在终端查看实际访问地址`;
      }
      
      return `${protocol}//${host}:${port}`;
    }

    function generateQRCode(url) {
      const qrcodeContainer = document.getElementById('qrcode');
      qrcodeContainer.innerHTML = ''; // 清空之前的二维码
      
      try {
        new QRCode(qrcodeContainer, {
          text: url,
          width: 200,
          height: 200,
          colorDark: "#1f2937",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (error) {
        qrcodeContainer.innerHTML = '<p style="color: #ef4444;">二维码生成失败，请手动复制链接</p>';
      }
    }

    function copyUrl() {
      const urlElement = document.getElementById('url');
      const url = urlElement.textContent;
      
      if (url.startsWith('http')) {
        navigator.clipboard.writeText(url).then(() => {
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = '✅ 已复制';
          btn.style.background = '#10b981';
          
          setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = '#3B82F6';
          }, 2000);
        }).catch(() => {
          alert('复制失败，请手动复制链接');
        });
      }
    }

    // 页面加载时初始化
    window.addEventListener('load', () => {
      const url = getLocalUrl();
      document.getElementById('url').textContent = url;
      
      if (url.startsWith('http')) {
        generateQRCode(url);
      } else {
        document.getElementById('qrcode').innerHTML = `
          <div style="padding: 24px; color: #6b7280; line-height: 1.6;">
            <p style="margin-bottom: 12px;">⚠️ 请在终端中查看实际访问地址</p>
            <p style="font-size: 12px;">运行 <code style="background: #f3f4f6; padding: 2px 8px; border-radius: 4px;">npm run dev</code> 后，终端会显示可用的网络地址</p>
          </div>
        `;
      }
    });

    // 自动检测URL变化
    setInterval(() => {
      const currentUrl = getLocalUrl();
      const displayUrl = document.getElementById('url').textContent;
      
      if (currentUrl !== displayUrl && currentUrl.startsWith('http')) {
        document.getElementById('url').textContent = currentUrl;
        generateQRCode(currentUrl);
      }
    }, 5000);
  </script>
</body>
</html>
